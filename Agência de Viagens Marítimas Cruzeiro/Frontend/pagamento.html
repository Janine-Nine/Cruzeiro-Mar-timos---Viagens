  <main class="container mt-4">
    <h1 class="main-title">Pagamento para a sua Viagem dos Sonhos</h1>
    <form action="../Backend/public/processar_pagamento.php" method="post" class="form-pagamento">
      <div class="form-group">
        <label for="nome_pagamento">Nome Completo:</label>
        <input type="text" id="nome_pagamento" name="nome" required>
      </div>
      <div class="form-group">
        <label for="email_pagamento">Email:</label>
        <input type="email" id="email_pagamento" name="email" required>
      </div>
      <div class="form-group">
        <label for="destino_pagamento">Destino Escolhido:</label>
        <select id="destino_pagamento" name="destino" required>
          <option value="">Confirme o destino</option>
          <option>Havaí - Estados Unidos</option>
          <option>Bahamas - Caribe</option>
          <option>Cancún - Quintana Roo, México</option>
          <option>Maldivas - República das Maldivas - Sri Lanka</option>
        </select>
      </div>
      <div class="form-group">
        <label for="pagamento">Forma de Pagamento:</label>
        <select id="pagamento" name="pagamento" required>
          <option value="">Selecione a forma de pagamento</option>
          <option>Cartão de Crédito</option>
          <option>Pix</option>
          <option>Boleto</option>
        </select>
      </div>
      <button type="submit" class="btn btn-custom">Confirmar Pagamento</button>
    </form>
