  <main class="container mt-4">
    <h1 class="main-title">Reserve sua Hospedagem</h1>
    <form action="../Backend/public/processar_hospedagem.php" method="post" class="form-hospedagem">
      <div class="form-group">
        <label for="nome_hospedagem">Nome Completo:</label>
        <input type="text" id="nome_hospedagem" name="nome" required>
      </div>
      <div class="form-group">
        <label for="email_hospedagem">Email:</label>
        <input type="email" id="email_hospedagem" name="email" required>
      </div>
      <div class="form-group">
        <label for="destino_hospedagem">Destino:</label>
        <select id="destino_hospedagem" name="destino" required>
          <option value="">Selecione o destino</option>
          <option>Havaí - Estados Unidos</option>
          <option>Bahamas - Caribe</option>
          <option>Cancún - Quintana Roo, México</option>
          <option>Maldivas - República das Maldivas - Sri Lanka</option>
        </select>
        </div>
      <div class="form-group">
        <label for="destino_hospedagem">Modo de Viagem:</label>
        <select id="destino_hospedagem" name="destino" required>
          <option value="">Selecione</option>
          <option>Avião</option>
          <option>Navio Cruzeiro</option>
          <option>Navio/Avião</option>
          <option>Nenhum</option>
        </select>
      </div>
      <div class="form-group">
        <label for="destino_hospedagem">Tipo de Modo de Viagem de Avião:</label>
        <select id="destino_hospedagem" name="destino" required>
          <option value="">Selecione</option>
          <option>Primeira Classe</option>
          <option>Classe Econômica</option>
          <option>Nenhum</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tipo_hospedagem">Tipo de Hospedagem do Navio Cruzeiro:</label>
        <select id="tipo_hospedagem" name="tipo_hospedagem" required>
          <option value="">Selecione o tipo</option>
          <option>Cabine Luxo</option>
          <option>Cabine Standard</option>
          <option>Suíte Master</option>
          <option>Suíte Presidencial</option>
          <option>Nenhum</option>
        </select>
      </div>
    </form>
    </div>
      <div class="form-group">
        <label for="tipo_hospedagem">Tipo de Hospedagem em Hotéis:</label>
        <select id="tipo_hospedagem" name="tipo_hospedagem" required>
          <option value="">Selecione o tipo</option>
          <option>Resort</option>
          <option>Hotel</option>
          <option>Bangalô</option>
          <option>Pousada</option>
        </select>
      </div>
      <button type="submit" class="btn btn-custom">Reservar Hospedagem</button>
